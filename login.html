<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi :)</title>
  <link rel="stylesheet" href="style/style.css">

</head>
<body>

  <div class="text" id="click-text" onclick="showInput()">Mulai</div>

  <div id="pass-container">
    <h3 class="text">tanggal lahirmu aja deh</h3>
    <p id="error-message"></p>
    <input type="password" id="pwd" placeholder="Password...">
    <br>
    <button class="Btn" id="unlock-btn" onclick="checkPassword()">Unlock</button>
  </div>

  <script>
    const correctPassword = "sayangku"; // UBAH PASSWORD DI SINI

    function showInput() {
      document.getElementById('click-text').style.display = 'none';
      document.getElementById('pass-container').style.display = 'flex';
    }

    function checkPassword() {
      const input = document.getElementById('pwd').value;
      if(input === correctPassword) {
        // Animasi Out
        document.body.classList.add('fade-out');
        // Tunggu layar kosong lalu pindah halaman
        setTimeout(() => {
          window.location.href = 'cake.html';
        }, 1000); 
      } else {
        document.getElementById('error-message').innerText = "Password salah, coba ingat lagi! 😝";
      }
    }
  </script>
</body>
</html>
